<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!--
    3IT.dev Logo Icon - Venn Diagram
    Square format for social media, app icons, etc.
  -->

  <!-- Circle 1: Information Technology (top) -->
  <circle cx="24" cy="12" r="10" fill="none" stroke="#34d399" stroke-width="2.5"/>

  <!-- Circle 2: Industrial Technology (bottom-left) -->
