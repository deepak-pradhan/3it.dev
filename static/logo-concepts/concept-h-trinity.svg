<svg viewBox="0 0 180 48" xmlns="http://www.w3.org/2000/svg">
  <!--
    CONCEPT H: TRINITY RINGS
    Three interlocking circles (Venn diagram style)
    representing the intersection of IT, Industrial, and Trade.
    Classic, professional, meaningful.
  -->
  <defs>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Logomark: Three interlocking rings -->
  <g id="mark" fill="none" stroke-width="2.5">
    <!-- Ring 1: Information Technology (top) -->
    <circle cx="20" cy="14" r="10" stroke="#34d399" opacity="0.9"/>

    <!-- Ring 2: Industrial Technology (bottom left) -->
    <circle cx="13" cy="28" r="10" stroke="#10b981" opacity="0.9"/>

    <!-- Ring 3: International Trade (bottom right) -->
    <circle cx="27" cy="28" r="10" stroke="#059669" opacity="0.9"/>

    <!-- Center highlight where all three meet -->
    <circle cx="20" cy="22" r="3" fill="#10b981"/>
  </g>

  <!-- Typography -->
  <text x="48" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="700" fill="currentColor"
        letter-spacing="-1">3IT</text>
  <text x="102" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="400" fill="#10b981"
        letter-spacing="-1">.dev</text>
</svg>
