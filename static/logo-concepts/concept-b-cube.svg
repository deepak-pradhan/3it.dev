<svg viewBox="0 0 180 48" xmlns="http://www.w3.org/2000/svg">
  <!--
    CONCEPT B: BUILDING BLOCKS
    Three stacked, offset cubes/planes forming a "3D" effect.
    Represents building, layers, and rapid assembly.
    Modern, architectural, enterprise-grade feel.
  -->
  <defs>
    <linearGradient id="cubeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="cubeGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Logomark: Three offset rectangles -->
  <g id="mark">
    <!-- Back layer (lightest) -->
    <rect x="8" y="8" width="20" height="20" rx="3" fill="#34d399" opacity="0.5"/>
    <!-- Middle layer -->
    <rect x="14" y="14" width="20" height="20" rx="3" fill="#10b981" opacity="0.75"/>
    <!-- Front layer (darkest) -->
    <rect x="20" y="20" width="20" height="20" rx="3" fill="#059669"/>
  </g>

  <!-- Typography -->
  <text x="56" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="700" fill="currentColor"
        letter-spacing="-1">3IT</text>
  <text x="112" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="400" fill="#10b981"
        letter-spacing="-1">.dev</text>
</svg>
