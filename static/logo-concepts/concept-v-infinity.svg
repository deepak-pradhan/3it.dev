<svg viewBox="0 0 180 48" xmlns="http://www.w3.org/2000/svg">
  <!--
    CONCEPT V: TRIPLE INFINITY
    Three interlocking infinity loops.
    Represents endless possibilities, continuity, and perpetual connection.
    Sophisticated, timeless, premium.
  -->

  <!-- Logomark: Three infinity loops -->
  <g id="mark" fill="none" stroke-width="2.5" stroke-linecap="round">
    <!-- Infinity 1: Information Technology -->
    <path d="M 10 18 Q 4 18, 4 24 Q 4 30, 10 30 Q 16 30, 20 24 Q 24 18, 30 18 Q 36 18, 36 24 Q 36 30, 30 30 Q 24 30, 20 24"
          stroke="#34d399" opacity="0.8"/>

    <!-- Infinity 2: Industrial Technology (offset down) -->
    <path d="M 10 22 Q 4 22, 4 28 Q 4 34, 10 34 Q 16 34, 20 28 Q 24 22, 30 22 Q 36 22, 36 28 Q 36 34, 30 34 Q 24 34, 20 28"
          stroke="#10b981" opacity="0.8"/>

    <!-- Infinity 3: International Trade (offset more) -->
    <path d="M 10 26 Q 4 26, 4 32 Q 4 38, 10 38 Q 16 38, 20 32 Q 24 26, 30 26 Q 36 26, 36 32 Q 36 38, 30 38 Q 24 38, 20 32"
          stroke="#059669" opacity="0.8"/>

    <!-- Center accent -->
    <circle cx="20" cy="28" r="3" fill="#10b981"/>
  </g>

  <!-- Typography -->
  <text x="48" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="700" fill="currentColor"
        letter-spacing="-1">3IT</text>
  <text x="102" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="400" fill="#10b981"
        letter-spacing="-1">.dev</text>
</svg>
