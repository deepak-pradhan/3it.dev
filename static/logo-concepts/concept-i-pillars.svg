<svg viewBox="0 0 180 48" xmlns="http://www.w3.org/2000/svg">
  <!--
    CONCEPT I: THREE PILLARS
    Three vertical bars of varying heights connected by a base.
    Represents the three domains as foundational pillars.
    Strong, stable, enterprise-grade.
  -->

  <!-- Logomark: Three pillars -->
  <g id="mark">
    <!-- Base connector -->
    <rect x="4" y="38" width="36" height="4" rx="2" fill="#10b981"/>

    <!-- Pillar 1: Information Technology (tallest, digital) -->
    <rect x="6" y="6" width="8" height="32" rx="2" fill="#34d399"/>

    <!-- Pillar 2: Industrial Technology (medium) -->
    <rect x="18" y="14" width="8" height="24" rx="2" fill="#10b981"/>

    <!-- Pillar 3: International Trade (connecting globally) -->
    <rect x="30" y="10" width="8" height="28" rx="2" fill="#059669"/>
  </g>

  <!-- Typography -->
  <text x="52" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="700" fill="currentColor"
        letter-spacing="-1">3IT</text>
  <text x="106" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="400" fill="#10b981"
        letter-spacing="-1">.dev</text>
</svg>
