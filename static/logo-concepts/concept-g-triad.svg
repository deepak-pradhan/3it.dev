<svg viewBox="0 0 180 48" xmlns="http://www.w3.org/2000/svg">
  <!--
    CONCEPT G: TRIAD CONVERGENCE
    Three distinct elements (representing IT, Industrial, Trade)
    converging at a central point.
    Shows unity, interconnection, and synergy.
  -->
  <defs>
    <linearGradient id="triadGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Logomark: Three paths converging to center -->
  <g id="mark">
    <!-- Information Technology (top) - digital/data feel -->
    <circle cx="20" cy="8" r="4" fill="#34d399"/>
    <line x1="20" y1="12" x2="20" y2="20" stroke="#34d399" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Industrial Technology (bottom left) - solid/mechanical -->
    <circle cx="8" cy="38" r="4" fill="#10b981"/>
    <line x1="11" y1="35" x2="17" y2="27" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>

    <!-- International Trade (bottom right) - global/connected -->
    <circle cx="32" cy="38" r="4" fill="#059669"/>
    <line x1="29" y1="35" x2="23" y2="27" stroke="#059669" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Central convergence point -->
    <circle cx="20" cy="24" r="5" fill="url(#triadGrad)"/>
  </g>

  <!-- Typography -->
  <text x="50" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="700" fill="currentColor"
        letter-spacing="-1">3IT</text>
  <text x="104" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="400" fill="#10b981"
        letter-spacing="-1">.dev</text>
</svg>
