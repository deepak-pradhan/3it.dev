<svg viewBox="0 0 180 48" xmlns="http://www.w3.org/2000/svg">
  <!--
    CONCEPT Q: GATEWAY
    Three arches forming a portal/gateway.
    Represents entry point, access, and opportunity.
    Architectural, grand, enterprise.
  -->

  <!-- Logomark: Three arches -->
  <g id="mark" fill="none" stroke-width="3" stroke-linecap="round">
    <!-- Outer arch (largest) -->
    <path d="M 4 42 L 4 20 Q 4 4, 20 4 Q 36 4, 36 20 L 36 42" stroke="#34d399"/>

    <!-- Middle arch -->
    <path d="M 10 42 L 10 22 Q 10 10, 20 10 Q 30 10, 30 22 L 30 42" stroke="#10b981"/>

    <!-- Inner arch (smallest) -->
    <path d="M 16 42 L 16 24 Q 16 16, 20 16 Q 24 16, 24 24 L 24 42" stroke="#059669"/>

    <!-- Base line -->
    <line x1="2" y1="42" x2="38" y2="42" stroke="#10b981" stroke-width="2"/>
  </g>

  <!-- Typography -->
  <text x="50" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="700" fill="currentColor"
        letter-spacing="-1">3IT</text>
  <text x="104" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="400" fill="#10b981"
        letter-spacing="-1">.dev</text>
</svg>
