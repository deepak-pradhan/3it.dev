<svg viewBox="0 0 180 48" xmlns="http://www.w3.org/2000/svg">
  <!--
    CONCEPT S: COMPASS / DIRECTIONS
    Three arrows pointing outward from center.
    Represents direction, guidance, and expansion into three domains.
    Dynamic, directional, leadership.
  -->
  <defs>
    <linearGradient id="compassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Logomark: Three directional arrows -->
  <g id="mark">
    <!-- Central hub -->
    <circle cx="20" cy="24" r="5" fill="url(#compassGrad)"/>

    <!-- Arrow 1: Information Technology (up-right) -->
    <line x1="24" y1="20" x2="38" y2="6" stroke="#34d399" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="38,6 32,8 36,12" fill="#34d399"/>

    <!-- Arrow 2: Industrial Technology (down-right) -->
    <line x1="24" y1="28" x2="38" y2="42" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="38,42 32,40 36,36" fill="#10b981"/>

    <!-- Arrow 3: International Trade (left) -->
    <line x1="15" y1="24" x2="2" y2="24" stroke="#059669" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="2,24 8,20 8,28" fill="#059669"/>
  </g>

  <!-- Typography -->
  <text x="50" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="700" fill="currentColor"
        letter-spacing="-1">3IT</text>
  <text x="104" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="400" fill="#10b981"
        letter-spacing="-1">.dev</text>
</svg>
