<svg viewBox="0 0 180 48" xmlns="http://www.w3.org/2000/svg">
  <!--
    CONCEPT R: BRIDGE
    Three bridge spans connecting points.
    Represents connection, infrastructure, and linking domains.
    Strong, structural, purposeful.
  -->

  <!-- Logomark: Bridge structure -->
  <g id="mark">
    <!-- Bridge deck (base) -->
    <rect x="2" y="36" width="40" height="4" rx="1" fill="#10b981"/>

    <!-- Three spans/arches -->
    <path d="M 4 36 Q 4 20, 14 20 Q 24 20, 24 36" fill="none" stroke="#34d399" stroke-width="2.5"/>
    <path d="M 12 36 Q 12 16, 22 16 Q 32 16, 32 36" fill="none" stroke="#10b981" stroke-width="2.5"/>
    <path d="M 20 36 Q 20 22, 30 22 Q 40 22, 40 36" fill="none" stroke="#059669" stroke-width="2.5"/>

    <!-- Anchor points -->
    <circle cx="4" cy="38" r="2" fill="#34d399"/>
    <circle cx="22" cy="38" r="2" fill="#10b981"/>
    <circle cx="40" cy="38" r="2" fill="#059669"/>
  </g>

  <!-- Typography -->
  <text x="54" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="700" fill="currentColor"
        letter-spacing="-1">3IT</text>
  <text x="108" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="400" fill="#10b981"
        letter-spacing="-1">.dev</text>
</svg>
