<svg viewBox="0 0 180 48" xmlns="http://www.w3.org/2000/svg">
  <!--
    CONCEPT T: CIRCUIT BOARD
    Three pathways on a circuit board meeting at a chip.
    Tech-forward, represents digital infrastructure.
    Modern, technical, precise.
  -->

  <!-- Logomark: Circuit paths -->
  <g id="mark">
    <!-- Central chip/processor -->
    <rect x="14" y="18" width="12" height="12" rx="2" fill="#10b981"/>
    <rect x="16" y="20" width="8" height="8" rx="1" fill="#0a0a0a"/>

    <!-- Circuit path 1: Information Technology (from top) -->
    <path d="M 20 4 L 20 18" stroke="#34d399" stroke-width="2" stroke-linecap="round"/>
    <circle cx="20" cy="4" r="3" fill="none" stroke="#34d399" stroke-width="2"/>

    <!-- Circuit path 2: Industrial Technology (from bottom-left) -->
    <path d="M 4 40 L 4 32 L 14 32 L 14 26" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
    <circle cx="4" cy="40" r="3" fill="none" stroke="#10b981" stroke-width="2"/>

    <!-- Circuit path 3: International Trade (from right) -->
    <path d="M 40 24 L 26 24" stroke="#059669" stroke-width="2" stroke-linecap="round"/>
    <circle cx="40" cy="24" r="3" fill="none" stroke="#059669" stroke-width="2"/>

    <!-- Small connection dots -->
    <circle cx="20" cy="10" r="1.5" fill="#34d399"/>
    <circle cx="4" cy="32" r="1.5" fill="#10b981"/>
    <circle cx="34" cy="24" r="1.5" fill="#059669"/>
  </g>

  <!-- Typography -->
  <text x="54" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="700" fill="currentColor"
        letter-spacing="-1">3IT</text>
  <text x="108" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="400" fill="#10b981"
        letter-spacing="-1">.dev</text>
</svg>
