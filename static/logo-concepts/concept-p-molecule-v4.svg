<svg viewBox="0 0 200 48" xmlns="http://www.w3.org/2000/svg">
  <!--
    CONCEPT P v4: MOLECULAR BOND - MINIMAL
    Ultra-clean, modern. Equal spacing, perfect symmetry.
  -->
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Logomark -->
  <g id="mark">
    <!-- Bonds - thin, elegant -->
    <line x1="22" y1="24" x2="22" y2="6" stroke="#10b981" stroke-width="2"/>
    <line x1="22" y1="24" x2="6.4" y2="38" stroke="#10b981" stroke-width="2"/>
    <line x1="22" y1="24" x2="37.6" y2="38" stroke="#10b981" stroke-width="2"/>

    <!-- Central nucleus - larger, gradient -->
    <circle cx="22" cy="24" r="8" fill="url(#grad4)"/>

    <!-- Outer atoms - uniform size, stroke style -->
    <circle cx="22" cy="4" r="4" fill="none" stroke="#34d399" stroke-width="2.5"/>
    <circle cx="5" cy="40" r="4" fill="none" stroke="#10b981" stroke-width="2.5"/>
    <circle cx="39" cy="40" r="4" fill="none" stroke="#059669" stroke-width="2.5"/>

    <!-- Dots inside outer atoms -->
    <circle cx="22" cy="4" r="1.5" fill="#34d399"/>
    <circle cx="5" cy="40" r="1.5" fill="#10b981"/>
    <circle cx="39" cy="40" r="1.5" fill="#059669"/>
  </g>

  <!-- Typography -->
  <text x="56" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="700" fill="currentColor"
        letter-spacing="-0.5">3IT</text>
  <text x="111" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="300" fill="#10b981"
        letter-spacing="-0.5">.dev</text>
</svg>
