<svg viewBox="0 0 180 48" xmlns="http://www.w3.org/2000/svg">
  <!--
    CONCEPT P: MOLECULAR BOND
    Three atoms bonded to a central nucleus.
    Scientific, represents synthesis and combination.
    Clean, balanced, professional.
  -->
  <defs>
    <linearGradient id="molGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Logomark: Molecular structure -->
  <g id="mark">
    <!-- Bonds (lines connecting atoms to center) -->
    <line x1="20" y1="24" x2="20" y2="6" stroke="#10b981" stroke-width="2.5" opacity="0.6"/>
    <line x1="20" y1="24" x2="6" y2="38" stroke="#10b981" stroke-width="2.5" opacity="0.6"/>
    <line x1="20" y1="24" x2="34" y2="38" stroke="#10b981" stroke-width="2.5" opacity="0.6"/>

    <!-- Central nucleus -->
    <circle cx="20" cy="24" r="6" fill="url(#molGrad)"/>

    <!-- Atom 1: Information Technology (top) -->
    <circle cx="20" cy="6" r="5" fill="#34d399"/>

    <!-- Atom 2: Industrial Technology (bottom left) -->
    <circle cx="6" cy="38" r="5" fill="#10b981"/>

    <!-- Atom 3: International Trade (bottom right) -->
    <circle cx="34" cy="38" r="5" fill="#059669"/>
  </g>

  <!-- Typography -->
  <text x="50" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="700" fill="currentColor"
        letter-spacing="-1">3IT</text>
  <text x="104" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="400" fill="#10b981"
        letter-spacing="-1">.dev</text>
</svg>
