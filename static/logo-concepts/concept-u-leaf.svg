<svg viewBox="0 0 180 48" xmlns="http://www.w3.org/2000/svg">
  <!--
    CONCEPT U: THREE LEAVES / GROWTH
    Three leaves emerging from a single stem.
    Represents organic growth, sustainability, and flourishing.
    Natural, growth-oriented, eco-conscious.
  -->
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <!-- Logomark: Three leaves -->
  <g id="mark">
    <!-- Stem -->
    <path d="M 20 44 Q 20 30, 20 24" stroke="#059669" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Leaf 1: Information Technology (top) -->
    <ellipse cx="20" cy="10" rx="6" ry="10" fill="#34d399" transform="rotate(0 20 10)"/>
    <line x1="20" y1="4" x2="20" y2="20" stroke="#0a0a0a" stroke-width="1" opacity="0.3"/>

    <!-- Leaf 2: Industrial Technology (left) -->
    <ellipse cx="8" cy="28" rx="5" ry="9" fill="#10b981" transform="rotate(-35 8 28)"/>
    <line x1="4" y1="22" x2="12" y2="34" stroke="#0a0a0a" stroke-width="1" opacity="0.3"/>

    <!-- Leaf 3: International Trade (right) -->
    <ellipse cx="32" cy="28" rx="5" ry="9" fill="#059669" transform="rotate(35 32 28)"/>
    <line x1="36" y1="22" x2="28" y2="34" stroke="#0a0a0a" stroke-width="1" opacity="0.3"/>

    <!-- Connection point -->
    <circle cx="20" cy="24" r="3" fill="url(#leafGrad)"/>
  </g>

  <!-- Typography -->
  <text x="50" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="700" fill="currentColor"
        letter-spacing="-1">3IT</text>
  <text x="104" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="400" fill="#10b981"
        letter-spacing="-1">.dev</text>
</svg>
