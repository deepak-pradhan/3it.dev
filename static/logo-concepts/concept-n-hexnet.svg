<svg viewBox="0 0 180 48" xmlns="http://www.w3.org/2000/svg">
  <!--
    CONCEPT N: HEXAGONAL NETWORK
    Three connected hexagons - tech/engineering aesthetic.
    Hexagons represent efficiency, structure, and modularity.
    Modern, technical, enterprise-grade.
  -->

  <!-- Logomark: Three connected hexagons -->
  <g id="mark" fill="none" stroke-width="2" stroke-linejoin="round">
    <!-- Hexagon 1: Information Technology (top) -->
    <polygon points="20,4 28,8 28,16 20,20 12,16 12,8" stroke="#34d399" fill="#34d399" fill-opacity="0.15"/>

    <!-- Hexagon 2: Industrial Technology (bottom left) -->
    <polygon points="12,22 20,26 20,34 12,38 4,34 4,26" stroke="#10b981" fill="#10b981" fill-opacity="0.15"/>

    <!-- Hexagon 3: International Trade (bottom right) -->
    <polygon points="28,22 36,26 36,34 28,38 20,34 20,26" stroke="#059669" fill="#059669" fill-opacity="0.15"/>

    <!-- Connection highlights -->
    <circle cx="20" cy="20" r="2" fill="#10b981"/>
    <circle cx="20" cy="26" r="2" fill="#10b981"/>
  </g>

  <!-- Typography -->
  <text x="48" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="700" fill="currentColor"
        letter-spacing="-1">3IT</text>
  <text x="102" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="400" fill="#10b981"
        letter-spacing="-1">.dev</text>
</svg>
