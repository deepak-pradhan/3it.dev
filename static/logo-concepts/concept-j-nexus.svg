<svg viewBox="0 0 180 48" xmlns="http://www.w3.org/2000/svg">
  <!--
    CONCEPT J: NEXUS
    Three nodes connected by lines forming a triangle network.
    Each node represents a domain; connections show synergy.
    Modern, tech-forward, network-inspired.
  -->
  <defs>
    <linearGradient id="nexusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Logomark: Connected triangle network -->
  <g id="mark">
    <!-- Connection lines (drawn first, behind nodes) -->
    <line x1="20" y1="8" x2="6" y2="36" stroke="#10b981" stroke-width="2" opacity="0.6"/>
    <line x1="20" y1="8" x2="34" y2="36" stroke="#10b981" stroke-width="2" opacity="0.6"/>
    <line x1="6" y1="36" x2="34" y2="36" stroke="#10b981" stroke-width="2" opacity="0.6"/>

    <!-- Central connection point -->
    <circle cx="20" cy="26" r="4" fill="url(#nexusGrad)"/>

    <!-- Inner connections to center -->
    <line x1="20" y1="8" x2="20" y2="22" stroke="#10b981" stroke-width="1.5" opacity="0.4"/>
    <line x1="6" y1="36" x2="16" y2="28" stroke="#10b981" stroke-width="1.5" opacity="0.4"/>
    <line x1="34" y1="36" x2="24" y2="28" stroke="#10b981" stroke-width="1.5" opacity="0.4"/>

    <!-- Node 1: Information Technology (top) -->
    <circle cx="20" cy="8" r="5" fill="#34d399"/>

    <!-- Node 2: Industrial Technology (bottom left) -->
    <circle cx="6" cy="36" r="5" fill="#10b981"/>

    <!-- Node 3: International Trade (bottom right) -->
    <circle cx="34" cy="36" r="5" fill="#059669"/>
  </g>

  <!-- Typography -->
  <text x="50" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="700" fill="currentColor"
        letter-spacing="-1">3IT</text>
  <text x="104" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="400" fill="#10b981"
        letter-spacing="-1">.dev</text>
</svg>
