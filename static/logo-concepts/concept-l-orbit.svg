<svg viewBox="0 0 180 48" xmlns="http://www.w3.org/2000/svg">
  <!--
    CONCEPT L: ORBITAL
    Three orbital paths around a central core.
    Represents the three domains orbiting around unified solutions.
    Global, dynamic, tech-forward.
  -->
  <defs>
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Logomark: Orbital system -->
  <g id="mark">
    <!-- Central core -->
    <circle cx="20" cy="24" r="6" fill="url(#orbitGrad)"/>

    <!-- Orbit 1: Information Technology (horizontal) -->
    <ellipse cx="20" cy="24" rx="16" ry="6" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.7"/>
    <circle cx="36" cy="24" r="3" fill="#34d399"/>

    <!-- Orbit 2: Industrial Technology (tilted left) -->
    <ellipse cx="20" cy="24" rx="16" ry="6" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.7"
             transform="rotate(-60 20 24)"/>
    <circle cx="12" cy="10" r="3" fill="#10b981"/>

    <!-- Orbit 3: International Trade (tilted right) -->
    <ellipse cx="20" cy="24" rx="16" ry="6" fill="none" stroke="#059669" stroke-width="1.5" opacity="0.7"
             transform="rotate(60 20 24)"/>
    <circle cx="12" cy="38" r="3" fill="#059669"/>
  </g>

  <!-- Typography -->
  <text x="50" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="700" fill="currentColor"
        letter-spacing="-1">3IT</text>
  <text x="104" y="33"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="400" fill="#10b981"
        letter-spacing="-1">.dev</text>
</svg>
