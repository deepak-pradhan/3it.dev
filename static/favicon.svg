<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!--
    3IT.dev Favicon - Venn Diagram Icon
    Three overlapping circles with "3" at center.
  -->

  <!-- Circle 1: Information Technology (top) -->
  <circle cx="16" cy="8" r="7" fill="none" stroke="#34d399" stroke-width="2"/>

  <!-- Circle 2: Industrial Technology (bottom-left) -->
  <circle cx="10" cy="20" r="7" fill="none" stroke="#10b981" stroke-width="2"/>

  <!-- Circle 3: International Trade (bottom-right) -->
  <circle cx="22" cy="20" r="7" fill="none" stroke="#059669" stroke-width="2"/>

  <!-- Center intersection -->
  <circle cx="16" cy="16" r="5" fill="#10b981"/>
  <text x="16" y="19" font-family="Inter, system-ui, sans-serif"
        font-size="8" font-weight="700" fill="#fff" text-anchor="middle">3</text>
</svg>
