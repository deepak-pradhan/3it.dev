<svg viewBox="0 0 200 48" xmlns="http://www.w3.org/2000/svg">
  <!--
    3IT.dev Logo White - For dark backgrounds
    Venn Diagram Style with white text.
  -->

  <!-- Logomark: Three overlapping circle outlines -->
  <g id="mark">
    <!-- Circle 1: Information Technology (top) -->
    <circle cx="24" cy="12" r="11" fill="none" stroke="#34d399" stroke-width="2.5"/>

    <!-- Circle 2: Industrial Technology (bottom-left) -->
    <circle cx="15" cy="30" r="11" fill="none" stroke="#10b981" stroke-width="2.5"/>

    <!-- Circle 3: International Trade (bottom-right) -->
    <circle cx="33" cy="30" r="11" fill="none" stroke="#059669" stroke-width="2.5"/>

    <!-- Center intersection -->
    <circle cx="24" cy="24" r="7" fill="#10b981"/>
    <text x="24" y="28" font-family="Inter, system-ui, -apple-system, sans-serif"
          font-size="11" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  </g>

  <!-- Typography - white text for dark backgrounds -->
  <text x="52" y="33" font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="800" fill="#ffffff" letter-spacing="-0.5">3IT</text>
  <text x="106" y="33" font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="400" letter-spacing="-0.5">
    <tspan fill="#f97316">.</tspan><tspan fill="#10b981">dev</tspan>
  </text>
</svg>
